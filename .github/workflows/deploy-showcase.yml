name: Deploy Showcase

on:
  push:
    branches: [main]
    paths:
      - "docs/showcase/**"
      - ".github/workflows/deploy-showcase.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload GitHub-readable showcase
        uses: actions/upload-artifact@v4
        with:
          name: scriptorium-showcase
          path: docs/showcase
          if-no-files-found: error
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload showcase
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/showcase
      - name: Write summary
        shell: bash
        run: |
          {
            echo "## Scriptorium showcase"
            echo
            echo "The GitHub-rendered comparison is available at:"
            echo "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${GITHUB_SHA}/docs/showcase/README.md"
            echo
            echo "The complete static bundle is attached as \`scriptorium-showcase\`."
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
