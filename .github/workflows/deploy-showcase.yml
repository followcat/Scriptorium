name: Deploy Showcase

on:
  push:
    branches: [main]
    paths:
      - "docs/showcase/**"
      - ".github/workflows/deploy-showcase.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Create the Pages site with GitHub Actions as its source when needed.
          enablement: true
      - name: Select GitHub Actions as Pages source
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateInformationAboutPagesSite({
              owner: context.repo.owner,
              repo: context.repo.repo,
              build_type: "workflow",
            });
      - name: Upload showcase
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/showcase

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
